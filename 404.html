<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Resplendent Global Travel Solutions</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
<style>
  .error-page {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: var(--gutter);
    background: var(--ivory);
  }
  .error-page__code {
    font-family: var(--font-display);
    font-size: clamp(4rem, 4rem + 6vw, 9rem);
    line-height: 1;
    color: var(--gold);
  }
  .error-page__actions {
    margin-top: 2.5rem;
    display: flex;
    gap: 1.25rem;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>
</head>
<body>
<main class="error-page">
  <span class="eyebrow" style="justify-content:center;">Page Not Found</span>
  <p class="error-page__code" aria-hidden="true">404</p>
  <h1>This route hasn't been mapped yet</h1>
  <p class="lede" style="margin-inline:auto; text-align:center;">The page you're looking for doesn't exist, may have moved, or is still being prepared. Let's get you back on course.</p>
  <div class="error-page__actions">
    <a href="/index.html" class="btn btn--primary">Return Home</a>
    <a href="/index.html#contact" class="btn btn--ghost-dark">Contact Us</a>
  </div>
</main>
</body>
</html>
